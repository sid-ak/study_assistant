name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

# Builds and tests only — no deploy (ADR 0003: local single-user scope).
jobs:
  checks:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync workspace
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy

      - name: Pytest
        run: uv run pytest

  docs:
    name: Docs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync workspace
        run: uv sync

      # Build-only (no deploy) so every push/PR is checked the same way as lint/mypy/pytest.
      # -W turns Sphinx warnings into errors. Deployment to Pages stays in docs-deploy.yaml.
      - name: Build docs
        run: uv run sphinx-build -b html docs site -W
