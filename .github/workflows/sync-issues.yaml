name: Sync issues mirror

# Regenerate docs/issues.md from GitHub issues whenever issues change. GitHub is the
# source of truth; this keeps the in-repo mirror in step and commits it back.
on:
  issues:
    types: [opened, closed, reopened, edited, labeled, unlabeled, deleted, transferred]

permissions:
  contents: write
  issues: read

# Shared group with sync-checkpoints so the two doc-sync workflows never push to the
# default branch at the same time (e.g. when merging a phase PR fires both at once).
concurrency:
  group: repo-docs-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Always operate on the default branch (dev) — that is where the mirror lives.
          ref: ${{ github.event.repository.default_branch }}

      - name: Regenerate docs/issues.md
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 .github/scripts/sync_issues.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- docs/issues.md; then
            echo "docs/issues.md already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/issues.md
          git commit -m "chore: sync docs/issues.md from GitHub issues [skip ci]"
          git push
