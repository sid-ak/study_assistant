name: Sync checkpoints log

# Append a row to docs/checkpoints.md when a PR is merged into the default branch (dev):
#  - the merged PR closes a `phase`-labeled issue (checkpoint = PR title), or
#  - the merged PR carries a `checkpoint: <text>` commit (checkpoint = <text>; an optional
#    `#<number>-` / `<number>-` prefix is accepted).
# Checkpoints are recorded only on merge, never from feature-branch pushes.
on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  issues: read
  pull-requests: read

# Shared group with sync-issues so the two doc-sync workflows never push to the default
# branch at the same time (merging a phase PR fires both `issues` and `pull_request`).
concurrency:
  group: repo-docs-sync
  cancel-in-progress: false

jobs:
  checkpoint:
    runs-on: ubuntu-latest
    # Only a PR merged into the default branch (dev). checkpoint.py decides whether it warrants a
    # row (closes a phase issue, or carries a `checkpoint:` commit).
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == github.event.repository.default_branch
    steps:
      - uses: actions/checkout@v5
        with:
          # Commit the log to the default branch (dev). The row's Branch column records the PR head.
          ref: ${{ github.event.repository.default_branch }}

      - name: Append checkpoint row (if applicable)
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: python3 .github/scripts/checkpoint.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- docs/checkpoints.md; then
            echo "No checkpoint change."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/checkpoints.md
          git commit -m "chore: append checkpoint to docs/checkpoints.md [skip ci]"
          git push
