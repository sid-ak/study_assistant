[project]
name = "rag_core"
version = "0.0.0"
description = "Shared retrieval core: ingestion, embedding, hybrid retrieval, reranking, pgvector access."
readme = "README.md"
requires-python = ">=3.12,<3.13"
dependencies = [
    "pgvector>=0.4.2",
    "psycopg[binary]>=3.3.4",
    "pydantic-settings>=2.14.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rag_core"]
